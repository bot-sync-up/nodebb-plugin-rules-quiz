name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Syntax check
        run: |
          for f in library.js lib/*.js static/lib/*.js; do node -c "$f"; done
      - name: Validate JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('plugin.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('languages/en-GB/rulesquiz.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('languages/he/rulesquiz.json','utf8'))"
      - name: i18n key parity (en-GB vs he)
        run: |
          node -e "const en=Object.keys(require('./languages/en-GB/rulesquiz.json')).sort();const he=Object.keys(require('./languages/he/rulesquiz.json')).sort();if(JSON.stringify(en)!==JSON.stringify(he)){console.error('i18n key mismatch');process.exit(1)}console.log('i18n parity OK',en.length,'keys')"
      - name: Unit tests
        run: npm test
